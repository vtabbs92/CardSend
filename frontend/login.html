<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CardSend â Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #F5F5F5; color: #111; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { width: 100%; max-width: 420px; background: #fff; border-radius: 20px; padding: 32px; border: 1px solid rgba(0,0,0,0.08); }
  .logo { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: #111; margin-bottom: 4px; }
  .logo span { color: #CC0000; }
  .tagline { font-size: 13px; color: #999; margin-bottom: 28px; }
  .tabs { display: flex; background: #F5F5F5; padding: 4px; border-radius: 10px; margin-bottom: 24px; gap: 4px; }
  .tab { flex: 1; padding: 10px; border: none; background: none; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; border-radius: 8px; color: #999; transition: all 0.2s; }
  .tab.active { background: #fff; color: #111; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .panel { display: none; }
  .panel.active { display: block; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; font-weight: 500; color: #555; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
  .field input, .field select { width: 100%; background: #F5F5F5; border: 1px solid rgba(0,0,0,0.14); border-radius: 10px; padding: 12px 14px; font-family: 'Inter', sans-serif; font-size: 14px; color: #111; outline: none; transition: border-color 0.2s; }
  .field input:focus, .field select:focus { border-color: #CC0000; background: #fff; }
  .btn { width: 100%; background: #CC0000; color: #fff; border: none; border-radius: 10px; padding: 14px; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; transition: all 0.18s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn:hover { background: #AA0000; }
  .btn:disabled { background: #DDD; color: #999; cursor: not-allowed; }
  .error-box { background: rgba(204,0,0,0.08); border: 1px solid rgba(204,0,0,0.2); color: #CC0000; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; display: none; }
  .error-box.show { display: block; }
  .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Card<span>Send</span></div>
  <div class="tagline">Regency Management Services</div>

  <div class="tabs">
    <button class="tab active" id="tab-signin" onclick="showTab('signin')">Sign In</button>
    <button class="tab" id="tab-signup" onclick="showTab('signup')">Create Account</button>
  </div>

  <div class="error-box" id="error-box"></div>

  <!-- Sign In Panel -->
  <div class="panel active" id="panel-signin">
    <div class="field">
      <label>Email</label>
      <input type="email" id="signin-email" placeholder="you@regency.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="signin-password" placeholder="â¢â¢â¢â¢â¢â¢â¢â¢">
    </div>
    <button class="btn" id="signin-btn" onclick="signIn()">Sign In</button>
  </div>

  <!-- Create Account Panel -->
  <div class="panel" id="panel-signup">
    <div class="field">
      <label>Full Name</label>
      <input type="text" id="signup-name" placeholder="e.g. Victor Tabbs">
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="signup-email" placeholder="you@regency.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="signup-password" placeholder="Min 6 characters">
    </div>
    <div class="field">
      <label>Role</label>
      <select id="signup-role">
        <option value="rep">Sales Rep</option>
        <option value="manager">Manager</option>
      </select>
    </div>
    <button class="btn" id="signup-btn" onclick="signUp()">Create Account</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://pdajbnuexprwnwulcqsz.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_3zKnA2FrW_kchD0IErIJ1w_T_NZHowb';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function showTab(tab) {
    const _ts = (id,v) => { const e=document.getElementById(id); if(e) e.classList.toggle('active',v); };
    const _th = (id,v) => { const e=document.getElementById(id); if(e) e.classList.toggle('hidden',v); };
    _ts('tab-signin', tab === 'signin');
    _ts('tab-signup', tab === 'signup');
    document.getElementById('panel-signin').classList.toggle('active', tab === 'signin');
    document.getElementById('panel-signup').classList.toggle('active', tab === 'signup');
    document.getElementById('error-msg').classList.remove('show');
  }

  function showError(msg) {
    const e = document.getElementById('error-box');
    e.textContent = msg;
    e.classList.add('show');
  }

  async function signIn() {
    const email    = document.getElementById('signin-email').value.trim();
    const password = document.getElementById('signin-password').value;
    if (!email || !password) { showError('Please fill in all fields'); return; }
    const btn = document.getElementById('signin-btn');
    btn.innerHTML = '<span class="spinner"></span>'; btn.disabled = true;
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) { showError(error.message); btn.innerHTML = 'Sign In'; btn.disabled = false; return; }
    await redirect(data.user);
  }

  async function signUp() {
    const name     = document.getElementById('signup-name').value.trim();
    const email    = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    const role     = document.getElementById('signup-role').value;
    if (!name || !email || !password) { showError('Please fill in all fields'); return; }
    if (password.length < 6) { showError('Password must be at least 6 characters'); return; }
    const btn = document.getElementById('signup-btn');
    btn.innerHTML = '<span class="spinner"></span>'; btn.disabled = true;
    const { data, error } = await sb.auth.signUp({ email, password, options: { data: { full_name: name, role } } });
    if (error) { showError(error.message); btn.innerHTML = 'Create Account'; btn.disabled = false; return; }
    if (data.user) await redirect(data.user);
    else { showError('Check your email to confirm your account'); btn.innerHTML = 'Create Account'; btn.disabled = false; }
  }

  async function redirect(user) {
    const { data: profile } = await sb.from('profiles').select('role').eq('id', user.id).single();
    window.location.href = 'index.html';
    
  }

  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) await redirect(session.user);
  })();
</script>
</body>
</html>
