<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CardSend — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #F5F5F5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: #fff; border-radius: 20px; padding: 36px 32px; width: 100%; max-width: 420px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  .logo { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: #111; margin-bottom: 4px; }
  .logo span { color: #CC0000; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 28px; }
  .tabs { display: flex; background: #F5F5F5; border-radius: 10px; padding: 4px; margin-bottom: 24px; }
  .tab-btn { flex: 1; padding: 9px; border: none; background: none; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; color: #888; cursor: pointer; border-radius: 8px; transition: all 0.2s; }
  .tab-btn.active { background: #fff; color: #111; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 11px; font-weight: 600; color: #555; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
  input, select { width: 100%; background: #F5F5F5; border: 1px solid #E0E0E0; border-radius: 10px; padding: 13px 14px; font-family: 'Inter', sans-serif; font-size: 14px; color: #111; outline: none; transition: border-color 0.2s; }
  input:focus, select:focus { border-color: #CC0000; background: #fff; }
  .btn { width: 100%; background: #CC0000; color: #fff; border: none; border-radius: 10px; padding: 15px; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 4px; transition: background 0.15s; }
  .btn:hover { background: #AA0000; }
  .btn:disabled { background: #ccc; cursor: not-allowed; }
  .error { color: #CC0000; font-size: 13px; margin-top: 12px; text-align: center; min-height: 18px; line-height: 1.5; }
  .success { color: #1A8A4A; font-size: 13px; margin-top: 12px; text-align: center; min-height: 18px; line-height: 1.5; }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Card<span>Send</span></div>
  <div class="subtitle">Regency Management Services</div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-signin" onclick="showTab('signin')">Sign In</button>
    <button class="tab-btn" id="tab-signup" onclick="showTab('signup')">Create Account</button>
  </div>

  <!-- Sign In Form -->
  <div id="form-signin">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="signin-email" placeholder="you@regency.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signin-password" placeholder="Your password" autocomplete="current-password">
    </div>
    <button class="btn" onclick="signIn()" id="signin-btn">Sign In</button>
    <div class="error" id="signin-error"></div>
  </div>

  <!-- Create Account Form -->
  <div id="form-signup" class="hidden">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="signup-name" placeholder="e.g. Victor Tabbs">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="signup-email" placeholder="you@regency.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signup-password" placeholder="Min 6 characters" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label>Role</label>
      <select id="signup-role">
        <option value="rep">Sales Rep</option>
      </select>
    </div>
    <button class="btn" onclick="signUp()" id="signup-btn">Create Account</button>
    <div class="error" id="signup-error"></div>
    <div class="success hidden" id="signup-success"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const sb = window.supabase.createClient('https://pdajbnuexprwnwulcqsz.supabase.co', 'sb_publishable_3zKnA2FrW_kchD0IErIJ1w_T_NZHowb');
  const API_BASE = 'https://cardsend-backend.onrender.com/api';

  function showTab(tab) {
    const signinTab = document.getElementById('tab-signin');
    const signupTab = document.getElementById('tab-signup');
    const signinForm = document.getElementById('form-signin');
    const signupForm = document.getElementById('form-signup');
    if (signinTab) signinTab.classList.toggle('active', tab === 'signin');
    if (signupTab) signupTab.classList.toggle('active', tab === 'signup');
    if (signinForm) signinForm.classList.toggle('hidden', tab !== 'signin');
    if (signupForm) signupForm.classList.toggle('hidden', tab !== 'signup');
    clearErrors();
  }

  function clearErrors() {
    ['signin-error','signup-error'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.textContent = '';
    });
    const succ = document.getElementById('signup-success');
    if (succ) succ.classList.add('hidden');
  }

  function showError(formType, msg) {
    const el = document.getElementById(formType + '-error');
    if (el) el.textContent = msg;
  }

  async function signIn() {
    const email = document.getElementById('signin-email').value.trim();
    const password = document.getElementById('signin-password').value;
    if (!email || !password) { showError('signin', 'Please fill in all fields.'); return; }
    const btn = document.getElementById('signin-btn');
    btn.disabled = true; btn.textContent = 'Signing in...';
    clearErrors();
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      btn.disabled = false; btn.textContent = 'Sign In';
      if (error.message.includes('Invalid')) showError('signin', 'Incorrect email or password.');
      else if (error.message.includes('confirm')) showError('signin', 'Please check your email and confirm your account first.');
      else showError('signin', error.message || 'Could not sign in. Please try again.');
    } else {
      window.location.href = 'index.html';
    }
  }

  async function signUp() {
    const name = document.getElementById('signup-name').value.trim();
    const email = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    if (!name) { showError('signup', 'Please enter your full name.'); return; }
    if (!email) { showError('signup', 'Please enter your email address.'); return; }
    if (!password || password.length < 6) { showError('signup', 'Password must be at least 6 characters.'); return; }
    const btn = document.getElementById('signup-btn');
    btn.disabled = true; btn.textContent = 'Creating account...';
    clearErrors();
    const { data, error } = await sb.auth.signUp({ email, password });
    if (error) {
      btn.disabled = false; btn.textContent = 'Create Account';
      if (error.message.includes('already registered')) showError('signup', 'An account with this email already exists. Try signing in.');
      else if (error.message.includes('valid')) showError('signup', 'Please enter a valid email address.');
      else showError('signup', error.message || 'Could not create account. Please try again.');
      return;
    }
    // Create rep profile
    try {
      await fetch(API_BASE + '/reps', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, user_id: data.user?.id })
      });
    } catch {}
    // Check if session exists (no email confirmation needed)
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      window.location.href = 'index.html';
    } else {
      btn.disabled = false; btn.textContent = 'Create Account';
      const succ = document.getElementById('signup-success');
      if (succ) { succ.textContent = 'Account created! Check your email to confirm, then sign in.'; succ.classList.remove('hidden'); }
      showTab('signin');
    }
  }

  // Auto-redirect if already logged in
  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) window.location.href = 'index.html';
  })();

  // Allow Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const signinForm = document.getElementById('form-signin');
      if (signinForm && !signinForm.classList.contains('hidden')) signIn();
      else signUp();
    }
  });
</script>
</body>
</html>
