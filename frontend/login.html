<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CardSend — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg: #FFFFFF; --bg2: #F5F5F5; --bg3: #EBEBEB; --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.14); --text: #111111; --text2: #555555; --text3: #999999; --accent: #CC0000; --accent2: #AA0000; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { width: 100%; max-width: 400px; }
  .logo { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
  .logo span { color: var(--accent); }
  .tagline { font-size: 13px; color: var(--text3); margin-bottom: 32px; }
  .tabs { display: flex; background: var(--bg2); padding: 4px; border-radius: 10px; margin-bottom: 24px; }
  .tab { flex: 1; padding: 10px; border: none; background: none; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; border-radius: 8px; color: var(--text3); transition: all 0.2s; }
  .tab.active { background: #fff; color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .form-panel { display: none; }
  .form-panel.active { display: block; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; font-weight: 500; color: var(--text2); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
  .field input, .field select { width: 100%; background: var(--bg2); border: 1px solid var(--border2); border-radius: 10px; padding: 12px 14px; font-family: 'Inter', sans-serif; font-size: 14px; color: var(--text); outline: none; transition: border-color 0.2s; }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .btn { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: 14px; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; transition: all 0.18s; }
  .btn:hover { background: var(--accent2); }
  .btn:disabled { background: var(--bg3); color: var(--text3); cursor: not-allowed; }
  .error { background: rgba(204,0,0,0.08); border: 1px solid rgba(204,0,0,0.2); color: var(--accent); border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; display: none; }
  .error.show { display: block; }
  .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--text3); font-size: 12px; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Card<span>Send</span></div>
  <div class="tagline">Regency Management Services</div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('signin')">Sign In</button>
    <button class="tab" onclick="showTab('signup')">Create Account</button>
  </div>

  <div class="error" id="error-msg"></div>

  <!-- Sign In -->
  <div class="form-panel active" id="panel-signin">
    <div class="field"><label>Email</label><input type="email" id="signin-email" placeholder="you@regency.com"></div>
    <div class="field"><label>Password</label><input type="password" id="signin-password" placeholder="••••••••"></div>
    <button class="btn" id="signin-btn" onclick="signIn()">Sign In</button>
  </div>

  <!-- Sign Up -->
  <div class="form-panel" id="panel-signup">
    <div class="field"><label>Full Name</label><input type="text" id="signup-name" placeholder="e.g. Victor Tabbs"></div>
    <div class="field"><label>Email</label><input type="email" id="signup-email" placeholder="you@regency.com"></div>
    <div class="field"><label>Password</label><input type="password" id="signup-password" placeholder="Min 6 characters"></div>
    <div class="field">
      <label>Role</label>
      <select id="signup-role">
        <option value="rep">Sales Rep</option>
        <option value="manager">Manager</option>
      </select>
    </div>
    <button class="btn" id="signup-btn" onclick="signUp()">Create Account</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://pdajbnuexprwnwulcqsz.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_3zKnA2FrW_kchD0IErIJ1w_T_NZHowb';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function showTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='signin')||(i===1&&tab==='signup')));
    document.getElementById('panel-signin').classList.toggle('active', tab==='signin');
    document.getElementById('panel-signup').classList.toggle('active', tab==='signup');
    hideError();
  }

  function showError(msg) { const e = document.getElementById('error-msg'); e.textContent = msg; e.classList.add('show'); }
  function hideError() { document.getElementById('error-msg').classList.remove('show'); }

  async function signIn() {
    const email = document.getElementById('signin-email').value.trim();
    const password = document.getElementById('signin-password').value;
    if (!email || !password) { showError('Please fill in all fields'); return; }
    const btn = document.getElementById('signin-btn');
    btn.innerHTML = '<span class="spinner"></span>'; btn.disabled = true;
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) { showError(error.message); btn.innerHTML = 'Sign In'; btn.disabled = false; return; }
    await redirectUser(data.user);
  }

  async function signUp() {
    const name     = document.getElementById('signup-name').value.trim();
    const email    = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    const role     = document.getElementById('signup-role').value;
    if (!name || !email || !password) { showError('Please fill in all fields'); return; }
    if (password.length < 6) { showError('Password must be at least 6 characters'); return; }
    const btn = document.getElementById('signup-btn');
    btn.innerHTML = '<span class="spinner"></span>'; btn.disabled = true;
    const { data, error } = await supabase.auth.signUp({ email, password, options: { data: { full_name: name, role } } });
    if (error) { showError(error.message); btn.innerHTML = 'Create Account'; btn.disabled = false; return; }
    await redirectUser(data.user);
  }

  async function redirectUser(user) {
    if (!user) return;
    const { data: profile } = await supabase.from('profiles').select('role').eq('id', user.id).single();
    if (profile?.role === 'manager') { window.location.href = 'manager.html'; }
    else { window.location.href = 'index.html'; }
  }

  // Check if already logged in
  (async () => {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) await redirectUser(session.user);
  })();
</script>
</body>
</html>
